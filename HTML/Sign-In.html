<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xpense AI - Sign In</title>
    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../CSS/Sign-In.css">
    <!--Popper JS-->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <!--Bootstrap JS-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <!--Google Roboto-->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!--Font Awesome-->
    <script src="https://kit.fontawesome.com/4bac6d041c.js" crossorigin="anonymous"></script>
</head>

<body>

    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3 text-center"
        style="z-index: 1050; width: 80%; max-width: 500px; display: none;">
        <div id="successAlert" class="alert alert-success alert-dismissible fade d-none" role="alert">
            <strong>Success!</strong> <span id="successMessage"></span>
        </div>
        <div id="errorAlert" class="alert alert-danger alert-dismissible fade d-none" role="alert">
            <strong>Error!</strong> <span id="errorMessage"></span>
        </div>
    </div>
    
    <div class="Background-Container d-flex flex-row justify-content-center align-items-center">
        <div class="Card-Container p-4 p-md-5 d-flex flex-row justify-content-center align-items-center">
            <div class="container">
                <div class="row">
                    <div class = "col-12 text-left mb-3">
                        <a href = "../Index.html"><i class="fa-solid fa-arrow-left-long text-light"></i></a>
                    </div>
                    <div class = "col-12 col-md-6">
                        <img src="https://res.cloudinary.com/doxjkpn5a/image/upload/v1738346555/pixelcut-export_q1vdhy.png"
                            class="Nav-Logo" />
                        <br />
                        <br />
                        <h1 class="Card-Heading">
                            Sign In
                        </h1>
                        <p class="Card-Paragraph">
                            with your Google account, or use your email and password to access your account.
                        </p>
                        <button id="Google-SignIn" class = "btn btn-primary mb-3">
                            <i class="fa-brands fa-google"></i> 
                               Continue with Google
                        </button>
                    </div>
                    <div class = "col-12 col-md-6">
                        <form id="SignInForm">
                            <div class="mb-3">
                                <label for="LoginEmail" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="LoginEmail"
                                    aria-describedby="emailHelp" placeholder="Enter your Email" required>
                                    <a href = "Sign-Up.html" class = "form-text">Create An Account?</a>
                            </div>
                            <div class="mb-3">
                                <label for="LoginPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="LoginPassword" placeholder="Enter your password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="ShowLoginPassword" onclick="toggleLoginPassword()">
                                <label class="form-check-label" for="ShowLoginPassword">Show Password</label>
                            </div>
                                <a href = "#" class = "form-text">Forgotten your password?</a>
                                <br/><br/>
                            <button type="submit" id="Login-Button" class="btn btn-primary w-100">Sign In</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../JS/Script-Main.js"></script>
    <script type="module" src="../JS/Script.js"></script>
    <script type="module" src="../JS/SignIn.js"></script>
    <script type="module" src="../JS/Authentication.js"></script>
</body>

</html>
