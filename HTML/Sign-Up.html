<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Xpense AI - Sign Up</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="../CSS/Sign-In.css">
    <link rel="stylesheet" href="../CSS/Sign-Up.css">

    <!-- Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
        integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
        crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
        integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
        crossorigin="anonymous"></script>
    <!-- Google Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/4bac6d041c.js" crossorigin="anonymous"></script>
    <!-- Zxcvbn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>

</head>

<body>
    <div id="alertContainer" class="position-fixed top-0 start-50 translate-middle-x mt-3 text-center"
        style="z-index: 1050; width: 80%; max-width: 500px; display: none;">
        <div id="successAlert" class="alert alert-success alert-dismissible fade d-none" role="alert">
            <strong>Success!</strong> <span id="successMessage"></span>
        </div>
        <div id="errorAlert" class="alert alert-danger alert-dismissible fade d-none" role="alert">
            <strong>Error!</strong> <span id="errorMessage"></span>
        </div>
    </div>

    <div class="Background-Container d-flex flex-row justify-content-center align-items-center">
        <div class="Card-Container p-4 p-md-5 d-flex flex-row justify-content-center align-items-center">
            <div class="container">
                <div class="row">
                    <div class="col-12 text-left mb-3">
                        <a href="../Index.html"><i class="fa-solid fa-arrow-left-long text-light"></i></a>
                    </div>
                    <div class="col-12 col-md-6">
                        <img src="https://res.cloudinary.com/doxjkpn5a/image/upload/v1738346555/pixelcut-export_q1vdhy.png"
                            class="Nav-Logo" />
                        <br />
                        <br />
                        <h1 class="Card-Heading">Create a new account</h1>
                        <p class="Card-Paragraph">
                            Sign up with your Google account, or use email and password to get started.
                        </p>
                        <button type="button" id="google-signup" class="btn btn-primary mb-3">
                            <i class="fa-brands fa-google"></i> <span>Continue with Google</span>
                        </button>
                    </div>
                    <div class="col-12 col-md-6">
                        <form id="SignUpForm">
                            <div class="mb-3">
                                <label for="SignUpName" class="form-label">Name</label>
                                <input type="text" class="form-control" id="SignUpName" placeholder="Enter your name"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="SignUpEmail" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="SignUpEmail" placeholder="Enter your Email"
                                    required>
                            </div>
                            <div class="mb-3">
                                <label for="SignUpPassword" class="form-label">Password</label>
                                <input type="password" class="form-control" id="SignUpPassword"
                                    placeholder="Enter your new password" required>

                                <!-- Strength Text (Initially Hidden) -->
                                <small id="passwordStrengthText" class="form-text d-none"></small>

                                <!-- Strength Progress Bar (Initially Hidden) -->
                                <div id="passwordStrengthContainer" class="progress mt-1 d-none">
                                    <div id="passwordStrengthBar" class="progress-bar" role="progressbar"
                                        style="width: 0%;" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>


                            <div class="mb-3">
                                <label for="SignUpConfirmPassword" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="SignUpConfirmPassword"
                                    placeholder="Re-enter your password" required>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="ShowSignUpPassword"
                                    onclick="toggleSignUpPassword()">
                                <label class="form-check-label" for="ShowSignUpPassword">Show Password</label>
                            </div>
                            <button type="submit" id="create-account" class="btn btn-primary w-100">
                                <span>Create</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../JS/Script-Main.js"></script>
    <script type="module" src="../JS/Script.js"></script>
    <script type="module" src="../JS/SignUp.js"></script>
    <script type="module" src="../JS/Authentication.js"></script>
</body>

</html>
